services:
  postgres:
    image: postgres:16-alpine
    container_name: pdfagent-postgres
    environment:
      POSTGRES_USER: pdfagent
      POSTGRES_PASSWORD: pdfagent
      POSTGRES_DB: pdfagent
    ports:
      - "5432:5432"
    volumes:
      - pdfagent_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdfagent-redis
    ports:
      - "6379:6379"
    volumes:
      - pdfagent_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pdfagent_pg_data:
  pdfagent_redis_data:
